# /etc/comitup.conf — Pi Klydo Clock Wi-Fi provisioning
# ------------------------------------------------------
# comitup implements the SoftAP + captive-portal flow WITHOUT touching the display:
#   1. On boot it tries known Wi-Fi networks.
#   2. If none connect, it raises an open access point (below) with a captive portal.
#   3. You join "PiClock-XXXX" from a phone, pick your network + enter the password.
#   4. comitup drops the AP and joins your network; on success NTP -> DS3231 writeback
#      runs (piclock-rtc-sync). The clock UI is a SEPARATE systemd service and keeps
#      running through ALL of this.
#
# install.sh copies this to /etc/comitup.conf.

# SSID the phone sees. <nnnn> is replaced with a per-device suffix by comitup.
ap_name: PiClock-<nnnn>

# Open AP (no password) so the captive portal is one tap. To lock the setup AP,
# set an 8+ char passphrase:
# ap_password: changeme123

# Appliance mode: headless, auto AP-fallback, stay in station mode once connected.
enable_appliance_mode: 1

# Optional hook fired on state changes (HOTSPOT / CONNECTING / CONNECTED). The clock
# UI does not need it, but this is where an on-screen "setup mode" banner could be
# triggered later without changing the provisioning flow.
# external_callback: /opt/piclock/scripts/comitup_hook.sh
